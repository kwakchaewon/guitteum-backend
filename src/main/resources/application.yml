spring:
  profiles:
    active: local
  application:
    name: guitteum-backend

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    encoding: UTF-8
    validate-on-migrate: true

  elasticsearch:
    uris: ${ELASTICSEARCH_URI:http://localhost:9200}
    connection-timeout: 5s
    socket-timeout: 30s

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

qdrant:
  host: ${QDRANT_HOST:localhost}
  port: ${QDRANT_PORT:6334}
  collection-name: speech_vectors
  vector-size: 768

data-go:
  api-key: ${DATA_GO_API_KEY:}
  mcp-command: uvx
  mcp-args: data-go-mcp.presidential-speeches@latest

gemini:
  api-key: ${GEMINI_API_KEY:}
  embedding-model: text-embedding-004
  chat-model: gemini-2.5-flash-lite
  base-url: https://generativelanguage.googleapis.com/v1beta

server:
  port: 8080

logging:
  level:
    root: INFO
    com.guitteum: DEBUG
